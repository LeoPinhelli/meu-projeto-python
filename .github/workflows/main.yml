name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate CLI commands
        run: |
          python main.py seed
          python main.py list
          python main.py stats

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy fake
        run: echo "Deploy realizado com sucesso"

  notify:
    name: notify
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always()

    steps:
      - name: Notificar Discord
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            MSG="✅ Pipeline concluído com sucesso no branch main!"
          else
            MSG="❌ Pipeline falhou! Verifique o GitHub Actions."
          fi

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{\"content\":\"$MSG\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}