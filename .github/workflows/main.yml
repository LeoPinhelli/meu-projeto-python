name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Run script
      run: python main.py

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Deploy fake
      run: echo "Deploy realizado com sucesso 🚀"